<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>Joshua Tree Virtual Tour</title>
<script src="https://aframe.io/releases/1.7.1/aframe.min.js"></script>
<style>
  * { box-sizing: border-box; }
  html, body {
    margin: 0;
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: #080808;
    font-family: Arial, Helvetica, sans-serif;
  }
  #landing {
    position: fixed;
    inset: 0;
    z-index: 30;
    display: grid;
    place-items: center;
    color: white;
    text-align: center;
    background:
      linear-gradient(rgba(0,0,0,.18), rgba(0,0,0,.72)),
      url("images/west-entrance.jpg") center / cover no-repeat;
  }
  #landingCard {
    width: min(620px, 88vw);
    padding: 36px 28px;
    border-radius: 24px;
    background: rgba(10,10,10,.62);
    backdrop-filter: blur(10px);
    box-shadow: 0 22px 70px rgba(0,0,0,.48);
  }
  #landing h1 {
    margin: 0 0 8px;
    font-size: clamp(42px, 7vw, 76px);
    letter-spacing: .02em;
  }
  #landing h2 {
    margin: 0 0 14px;
    font-size: clamp(20px, 3vw, 30px);
    font-weight: 500;
  }
  #landing p {
    margin: 0 auto;
    max-width: 500px;
    line-height: 1.55;
    opacity: .9;
  }
  #start {
    margin-top: 22px;
    border: 0;
    border-radius: 999px;
    padding: 14px 26px;
    font-size: 17px;
    font-weight: 700;
    cursor: pointer;
  }
  #help {
    position: fixed;
    z-index: 10;
    left: 14px;
    bottom: 14px;
    color: white;
    background: rgba(0,0,0,.56);
    padding: 9px 12px;
    border-radius: 12px;
    font-size: 12px;
    pointer-events: none;
  }
</style>

<script>
AFRAME.registerComponent("tour-controller", {
  init: function () {
    const stops = [{"title": "West Entrance", "subtitle": "Start of the west-to-south park route", "fact": "This entrance brings visitors into the Mojave Desert section of Joshua Tree National Park.", "image": "images/west-entrance.jpg", "width": 819, "height": 546, "aspect": 1.5}, {"title": "Hidden Valley", "subtitle": "Rock formations and climbing country", "fact": "Hidden Valley is surrounded by huge granite formations and is one of the park\u2019s best-known areas.", "image": "images/hidden-valley.jpg", "width": 499, "height": 338, "aspect": 1.476331}, {"title": "Keys View Detour", "subtitle": "Panoramic overlook", "fact": "Keys View overlooks the Coachella Valley and the San Andreas Fault.", "image": "images/keys-view.jpg", "width": 997, "height": 343, "aspect": 2.906706}, {"title": "Cap Rock", "subtitle": "Balancing-rock landscape", "fact": "Cap Rock is named for the large boulder that appears to rest on top of the formation.", "image": "images/cap-rock.jpg", "width": 375, "height": 500, "aspect": 0.75}, {"title": "Barker Dam", "subtitle": "Historic water site", "fact": "The Barker Dam area combines desert scenery, history, and a short popular trail.", "image": "images/barker-dam.jpg", "width": 499, "height": 333, "aspect": 1.498498}, {"title": "Skull Rock", "subtitle": "One of the park\u2019s most recognizable formations", "fact": "Natural erosion created depressions that make this boulder resemble a skull.", "image": "images/skull-rock.jpg", "width": 500, "height": 375, "aspect": 1.333333}, {"title": "Jumbo Rocks", "subtitle": "Massive granite boulders", "fact": "Jumbo Rocks is famous for enormous rounded boulders and a popular campground.", "image": "images/jumbo-rocks.jpg", "width": 500, "height": 375, "aspect": 1.333333}, {"title": "Arch Rock", "subtitle": "Natural granite arch", "fact": "Arch Rock was shaped over time by weathering and erosion.", "image": "images/arch-rock.jpg", "width": 500, "height": 375, "aspect": 1.333333}, {"title": "Cholla Cactus Garden", "subtitle": "Dense field of teddy-bear cholla", "fact": "This area contains one of the park\u2019s most concentrated stands of cholla cactus.", "image": "images/cholla-garden.jpg", "width": 499, "height": 333, "aspect": 1.498498}, {"title": "Ocotillo Patch", "subtitle": "Lower-desert vegetation", "fact": "Ocotillo plants can look bare for long periods, then quickly produce leaves after rain.", "image": "images/ocotillo-patch.jpg", "width": 400, "height": 400, "aspect": 1.0}, {"title": "Cottonwood Area", "subtitle": "Southern section of the park", "fact": "The Cottonwood area sits in the Colorado Desert section of Joshua Tree.", "image": "images/cottonwood-area.jpg", "width": 499, "height": 335, "aspect": 1.489552}, {"title": "Night Sky Finale", "subtitle": "Finish under the desert stars", "fact": "Joshua Tree is widely known for dark skies and excellent stargazing.", "image": "images/night-sky.jpg", "width": 780, "height": 520, "aspect": 1.5}];
    let current = 0;

    const photo = document.querySelector("#photo");
    const title = document.querySelector("#title");
    const subtitle = document.querySelector("#subtitle");
    const fact = document.querySelector("#fact");
    const stopLabel = document.querySelector("#stopLabel");
    const sidePanel = document.querySelector("#sidePanel");
    const prev = document.querySelector("#prev");
    const next = document.querySelector("#next");

    function sizePhoto(stop) {
      const aspect = stop.width / stop.height;

      // Preserve each photo's natural aspect ratio without cropping or stretching.
      let width, height;
      const maxW = 7.1;
      const maxH = 5.0;

      if (aspect >= 1) {
        width = Math.min(maxW, maxH * aspect);
        height = width / aspect;
        if (height > maxH) {
          height = maxH;
          width = height * aspect;
        }
      } else {
        height = maxH;
        width = height * aspect;
      }

      photo.setAttribute("width", width);
      photo.setAttribute("height", height);

      // Keep the visual group centered while allowing portrait and panorama images.
      const leftX = aspect < 0.9 ? -1.65 : -1.95;
      photo.setAttribute("position", `${leftX} 1.7 -5`);

      // Move the text panel slightly depending on the image width.
      const panelX = Math.max(2.25, leftX + width / 2 + 1.75);
      sidePanel.setAttribute("position", `${panelX} 1.7 -4.9`);
    }

    function show(index) {
      current = (index + stops.length) % stops.length;
      const stop = stops[current];

      photo.setAttribute("material", `src:${stop.image};shader:flat`);
      title.setAttribute("value", stop.title);
      subtitle.setAttribute("value", stop.subtitle);
      fact.setAttribute("value", stop.fact);
      stopLabel.setAttribute("value", `STOP ${current + 1} OF ${stops.length}`);

      sizePhoto(stop);
    }

    prev.addEventListener("click", () => show(current - 1));
    next.addEventListener("click", () => show(current + 1));
    show(0);
  }
});
</script>
</head>

<body>
<div id="landing">
  <div id="landingCard">
    <h1>Joshua Tree</h1>
    <h2>Interactive Virtual Field Trip</h2>
    <p>Travel from the West Entrance through the park and finish beneath the desert night sky.</p>
    <button id="start">Start Tour</button>
  </div>
</div>

<div id="help">Desktop: drag to look • Quest: open the link, enter VR, point and click</div>

<a-scene tour-controller renderer="colorManagement:true" vr-mode-ui="enabled:true">
  <a-assets timeout="15000">
    <img src="images/west-entrance.jpg"><img src="images/hidden-valley.jpg"><img src="images/keys-view.jpg"><img src="images/cap-rock.jpg"><img src="images/barker-dam.jpg"><img src="images/skull-rock.jpg"><img src="images/jumbo-rocks.jpg"><img src="images/arch-rock.jpg"><img src="images/cholla-garden.jpg"><img src="images/ocotillo-patch.jpg"><img src="images/cottonwood-area.jpg"><img src="images/night-sky.jpg">
  </a-assets>

  <a-sky color="#090909"></a-sky>

  <!-- Image dimensions are calculated per slide from the original image ratio. -->
  <a-plane id="photo"
    position="-1.95 1.7 -5"
    material="src:images/west-entrance.jpg;shader:flat">
  </a-plane>

  <!-- Side information panel -->
  <a-entity id="sidePanel" position="2.8 1.7 -4.9">
    <a-plane width="3.25" height="5.0"
      material="color:#111318;opacity:.92;transparent:true"
      geometry="primitive:plane">
    </a-plane>

    <a-text id="stopLabel"
      value="STOP 1 OF 12"
      width="2.6"
      color="#c9c9c9"
      align="left"
      position="-1.28 2.05 .02">
    </a-text>

    <a-text id="title"
      value="West Entrance"
      width="2.75"
      color="#ffffff"
      align="left"
      wrap-count="22"
      position="-1.28 1.45 .02">
    </a-text>

    <a-text id="subtitle"
      value=""
      width="2.65"
      color="#d8d8d8"
      align="left"
      wrap-count="28"
      position="-1.28 .78 .02">
    </a-text>

    <a-plane width="2.55" height=".02"
      material="color:#555"
      position="0 .28 .02">
    </a-plane>

    <a-text id="fact"
      value=""
      width="2.65"
      color="#ffffff"
      align="left"
      wrap-count="34"
      position="-1.28 -.02 .02">
    </a-text>

    <!-- Small clean navigation buttons -->
    <a-entity id="prev" class="clickable" position="-.72 -1.82 .03"
      geometry="primitive:plane;width:1.15;height:.52"
      material="color:#f2f2f2"
      animation__mouseenter="property:scale;to:1.06 1.06 1.06;startEvents:mouseenter;dur:120"
      animation__mouseleave="property:scale;to:1 1 1;startEvents:mouseleave;dur:120">
      <a-text value="PREVIOUS" color="#111" align="center" width="2.8" position="0 0 .02"></a-text>
    </a-entity>

    <a-entity id="next" class="clickable" position=".72 -1.82 .03"
      geometry="primitive:plane;width:1.15;height:.52"
      material="color:#ffffff"
      animation__mouseenter="property:scale;to:1.06 1.06 1.06;startEvents:mouseenter;dur:120"
      animation__mouseleave="property:scale;to:1 1 1;startEvents:mouseleave;dur:120">
      <a-text value="NEXT" color="#111" align="center" width="2.8" position="0 0 .02"></a-text>
    </a-entity>
  </a-entity>

  <a-entity camera look-controls position="0 1.6 0">
    <a-cursor raycaster="objects:.clickable" color="white"></a-cursor>
  </a-entity>
</a-scene>

<script>
document.getElementById("start").addEventListener("click", () => {
  document.getElementById("landing").style.display = "none";
});
</script>
</body>
</html>
